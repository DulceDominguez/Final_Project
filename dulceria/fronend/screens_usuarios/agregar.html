<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Usuario - Dulcería</title>
    <link href="../CSS/estilo_agregar.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <a href="usuarios.html" class="btn-regresar">⬅ Regresar</a>
    <div class="pantalla-fondo">
        <div class="tarjeta-formulario">
            <h2 id="titulo-form">Agregar Usuario</h2>
            <form id="formulario">

                <input type="hidden" id="id_usuario_input" name="id_usuario" readonly>
                <div class="grupo-input">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="grupo-input">
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" required>
                </div>
                <div class="grupo-input">
                    <label for="telefono">Teléfono:</label>
                    <input type="text" id="telefono" required>
                </div>
                <div class="grupo-input">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="contenedor-boton">
                    <button type="submit" class="btn-agregar-form">Agregar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-exito"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000;">
        <div style="background: white; padding: 30px; border-radius: 30px; text-align: center; width: 300px;">
            <p id="mensaje-exito" style="font-weight: 600; font-size: 20px; color: #6d5051; font-family: 'Montserrat';">
                Agregado<br>correctamente</p>
            <img src="../iconos/cupcake.png" alt="Cupcake" style="width: 80px; margin: 15px 0;">
            <button id="btn-ok-exito"
                style="background: #ffb5ba; border: none; padding: 10px 40px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer;">OK</button>
        </div>
    </div>

    <div id="modal-error"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000;">
        <div style="background: white; padding: 30px; border-radius: 30px; text-align: center; width: 300px;">
            <h2 style="font-size: 18px; color: #ff6b6b; font-family: 'Montserrat';">Error, vuelve a intentarlo</h2>
            <img src="../iconos/cupcake.png" alt="Cupcake" style="width: 80px; margin: 15px 0; filter: grayscale(1);">
            <button id="btn-ok-error"
                style="background: #ff6b6b; border: none; padding: 10px 40px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer;">OK</button>
        </div>
    </div>

    <script src="agregar_usuario_post.js"></script>

    <script>
        // Al cargar esta pantalla, buscamos el ID que guardamos en el Home
        window.onload = function () {
            const idGuardado = localStorage.getItem('idUsuarioActual');

            if (idGuardado) {
                // Ponemos el ID automáticamente en el cuadrito de texto
                document.getElementById('id_usuario_input').value = idGuardado;
            } else {
                // Si por algo no hay ID, lo regresamos al login por seguridad
                alert("Sesión expirada. Por favor inicia sesión de nuevo.");
                window.location.href = "/";
            }
        }
    </script>
</body>

</html>
