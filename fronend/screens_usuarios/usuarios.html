<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Dulcería</title>
    <link href="../CSS/estilo_usuarios.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
</head>

<body>
    <a href="../menu" class="btn-regresar">⬅ Regresar</a>

    <div class="contenedor">
        <header class="barra-superior">
            <div class="espacio-vacio"></div>
            <h1>Usuarios</h1>
            <a href="agregar.html"><button class="btn-agregar" id="btn-nuevo-registro"></button></a>
        </header>

        <main class="area-contenido">
            <table class="tabla-inventario">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Telefono</th>
                        <th>Contraseña</th>
                        <th>Acciones</th>

                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                </tbody>
            </table>
        </main>
    </div>
    <div id="modal-eliminar"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000;">
        <div
            style="background: white; padding: 30px; border-radius: 20px; text-align: center; color: #6d5051; width: 300px;">
            <h3>¿Eliminar usuario?</h3>
            <p>Esta acción no tiene vuelta atrás.</p>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button id="confirmar-si"
                    style="background: #ff6b81; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Sí,
                    eliminar</button>
                <button id="confirmar-no"
                    style="background: #ccc; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../JS_usuarios/usuarios_get.js"></script>
</body>

</html>
