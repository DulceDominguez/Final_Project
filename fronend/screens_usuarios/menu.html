<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Dulcería</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #fdf49a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* El secreto está en este contenedor */
        .contenedor-blanco {
            background-color: white;
            width: 100%;
            max-width: 360px;
            /* Lo hacemos más estrecho para forzar el orden */
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header-morado {
            background-color: #e3abf1;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-cerrar {
            align-self: flex-end;
            background: #6d5a5a;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
        }

        .header-morado h1 {
            color: #6d5051;
            font-size: 20px;
            text-align: center;
        }

        /* FORZAMOS VERTICALIDAD TOTAL */
        .menu-opciones {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            /* SIEMPRE UNA DEBAJO DE OTRA */
            gap: 20px;
            align-items: center;
        }

        .caja {
            background: #f5f5f5;
            width: 100%;
            /* Ocupa todo el ancho disponible del cuadro blanco */
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            /* Icono arriba, texto abajo */
            align-items: center;
            text-decoration: none;
            color: #6d5051;
            border: 1px solid #ddd;
        }

        .caja img {
            width: 75px;
            height: 75px;
            margin-bottom: 10px;
        }

        .caja span {
            font-weight: bold;
            font-size: 18px;
        }

        .caja:active {
            transform: scale(0.96);
            background-color: #e9e9e9;
        }
    </style>
</head>

<body>
    <div class="contenedor-blanco">
        <header class="header-morado">
            <a href="/logout" class="btn-cerrar">Cerrar Sesión</a>
            <h1>🍭 ¡Bienvenida, <br><span id="nombre-usuario">Dulce</span>! ✨</h1>
        </header>

        <main class="menu-opciones">
            <a href="/inventario" class="caja">
                <img src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png" alt="Inventario">
                <span>Inventario</span>
            </a>

            <a href="/usuarios" class="caja">
                <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" alt="Usuarios">
                <span>Agregar Usuario</span>
            </a>
        </main>
    </div>
</body>

</html>
