<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link href="../CSS/estilo_agregar.css" rel="stylesheet">
</head>
<body>
    <a href="inventario.html" class="btn-regresar">⬅ Regresar</a>
    <div class="pantalla-fondo">
        <div class="tarjeta-formulario">
            <h2>Editar Producto</h2>
            <form id="formulario-editar">
                <input type="hidden" id="edit-id">
                
                <div class="grupo-input">
                    <label>Nombre:</label>
                    <input type="text" id="edit-nombre" required>
                </div>
                <div class="grupo-input">
                    <label>Cantidad:</label>
                    <input type="number" id="edit-cantidad" required>
                </div>
                <div class="grupo-input">
                    <label>Precio:</label>
                    <input type="number" id="edit-precio" step=".1" required>
                </div>
                <div class="contenedor-boton">
                    <button type="submit" class="btn-agregar-form">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-exito" class="modal-oculto">
        <div class="tarjeta-alerta">
            <p>Actualizado<br>correctamente</p>
            <button id="btn-ok-exito" class="btn-ok">OK</button>
        </div>
    </div>

    <script src="../JS_inventario/editar_put.js"></script>
</body>
</html>
