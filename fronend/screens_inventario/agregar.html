<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
    <link href="../CSS/estilo_agregar.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <a href="inventario.html" class="btn-regresar">⬅ Regresar</a>
    <div class="pantalla-fondo">
        <div class="tarjeta-formulario">
            <h2>Agregar Producto</h2>

            <form id="formulario">
                <input type="hidden" id="id_user" value="1">

                <div class="grupo-input">
                    <label for="nombre">Nombre del producto:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="grupo-input">
                    <label for="cantidad">Cantidad:</label>
                    <input type="number" id="cantidad" name="cantidad" required>
                </div>

                <div class="grupo-input">
                    <label for="precio">Precio:</label>
                    <input type="number" id="precio" name="precio" step=".1" required>
                </div>

                <div class="contenedor-boton">
                    <button type="submit" class="btn-agregar-form">Agregar</button>
                </div>
            </form>
        </div>
    </div>
    <div id="modal-exito" class="modal-oculto">
        <div class="tarjeta-alerta">
            <p>Agregado<br>correctamente</p>

            <img src="../iconos/cupcake.png" alt="Cupcake" class="icono-cupcake">

            <button id="btn-ok-exito" class="btn-ok">OK</button>
        </div>
    </div>

    <div id="modal-error" class="modal-oculto">
        <div class="tarjeta-alerta">
            <h2>Error, vuelve a intentarlo</h2>
            <img src="../iconos/cupcake.png" alt="Cupcake" class="icono-cupcake">
            <button id="btn-ok-error" class="btn-ok">OK</button>
        </div>
    </div>

    <script src="../JS_inventario/agregar_post.js"></script>
</body>

</html>
